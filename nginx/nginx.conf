worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # JSON access log.
    log_format hng_json escape=json
        '{'
            '"source_ip":"$http_x_forwarded_for",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"upstream_addr":"$upstream_addr",'
            '"request_time":$request_time'
        '}';

    # Trust and preserve forwarded client IP.
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 0.0.0.0/0;

    access_log /var/log/nginx/hng-access.log hng_json;
    error_log  /var/log/nginx/error.log warn;

    upstream nextcloud_upstream {
        server nextcloud:80;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://nextcloud_upstream;
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
