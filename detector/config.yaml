app:
  environment: "dev"
  poll_interval_seconds: 0.2

logs:
  nginx_access_log_path: "/var/lib/docker/volumes/HNG-nginx-logs/_data/hng-access.log"
  skip_empty_source_ip: true

windows:
  sliding_window_seconds: 60
  stats_print_interval_seconds: 3
  stats_thread_enabled: true

baseline:
  window_seconds: 1800
  recalc_interval_seconds: 60
  min_current_hour_samples: 300
  mean_floor: 0.1
  stddev_floor: 0.1
  error_floor: 0.01

detection:
  z_threshold: 3.0
  multiplier_threshold: 5.0
  error_surge_multiplier: 3.0
  tightened_z_threshold: 2.5
  tightened_multiplier_threshold: 4.0
  alert_cooldown_seconds: 10

output:
  print_pretty: true
  print_events: true
