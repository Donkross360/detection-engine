services:
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: unless-stopped
    networks:
      - hng-net
    expose:
      - "80"
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: hng-nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "80:80"
    networks:
      - hng-net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs

networks:
  hng-net:
    driver: bridge
